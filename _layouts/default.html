<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body>

  <a class="skip-to-content" href="#main-content">Skip to content</a>

  {% if site.data.settings.google-analytics %}
    {% include google-analytics.html %}
  {% endif %}

  {% include header.html %}

  <!-- begin content -->
  <main id="main-content" class="content" aria-label="Content">
    {{ content }}
  </main>
  <!-- end content -->

  <div class="top" title="Top" role="button" aria-label="Scroll to top" tabindex="0"><i class="ion ion-ios-arrow-round-up"></i></div>

  {% include footer.html %}

  <script src="{{ site.baseurl }}/js/scripts.js"></script>
  <script src="{{ site.baseurl }}/js/common.js"></script>
</body>

</html>
